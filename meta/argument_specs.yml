---
argument_specs:
  main:
    short_description: iptables NAT / IP-masquerade for the STRATUM dev bastion
    description:
      - Enables IPv4 forwarding via sysctl and configures iptables MASQUERADE NAT.
      - Interface names are auto-detected from Ansible facts when the defaults are
        left empty; set them explicitly to override (e.g. in molecule tests).
    options:
      nat_external_interface:
        type: str
        default: ""
        description:
          - Name of the network interface connected to the internet.
          - Used as the POSTROUTING MASQUERADE target and the FORWARD out_interface.
          - Empty string (default) auto-detects from ansible_facts.default_ipv4.interface.
          - "Example: ens4 (GCP Ubuntu 24.04 NIC0), eth0 (molecule / legacy)"

      nat_internal_interface:
        type: str
        default: ""
        description:
          - Name of the network interface connected to the internal VPC.
          - Packets arriving on this interface are forwarded to nat_external_interface.
          - Empty string (default) auto-detects the interface whose IPv4 address matches
            nat_internal_ip; nat_internal_ip must be non-empty for detection to succeed.
          - "Example: ens5 (GCP Ubuntu 24.04 NIC1), eth1 (molecule / legacy)"

      nat_internal_cidr:
        type: str
        default: "10.100.0.0/24"
        description:
          - CIDR notation of the internal subnet.
          - Informational; used in documentation and molecule verify assertions.
          - "Example: 10.100.0.0/24"

      nat_sysctl_conf:
        type: str
        default: /etc/sysctl.d/99-stratum-nat.conf
        description:
          - Absolute path to the sysctl drop-in file that persists ip_forward across reboots.
          - Must be writable by the Ansible connection user (usually root).
          - "Example: /etc/sysctl.d/99-stratum-nat.conf"

      nat_internal_route_manage:
        type: bool
        default: true
        description:
          - When true, install an explicit main-table route for nat_internal_cidr via the
            resolved internal interface.
          - Ensures bastion-originated traffic to internal nodes (ProxyJump inner hop) egresses the internal NIC.
          - Set to false only if the route is managed externally (e.g., by cloud agent metadata).

      nat_internal_ip:
        type: str
        default: ""
        description:
          - Optional explicit source address for the internal-subnet route (the src attribute).
          - Empty string lets the kernel select the interface address automatically.
          - Also drives internal interface auto-detection when nat_internal_interface is "".
          - "Example: 10.100.0.2"

      nat_internal_route_unit:
        type: str
        default: /etc/systemd/system/stratum-internal-route.service
        description:
          - Absolute path where the systemd oneshot unit that persists the route is written.
          - Only used when nat_internal_route_manage is true and the service manager is systemd.
          - "Example: /etc/systemd/system/stratum-internal-route.service"
