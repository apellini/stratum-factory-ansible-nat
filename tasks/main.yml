---
# stratum_factory.nat — tasks/main.yml
# Enables IPv4 forwarding and configures iptables MASQUERADE NAT.
# All interface names come from role defaults (or caller overrides); when the
# defaults are empty ("") the role auto-detects them from Ansible gathered facts
# so the role works transparently on any NIC naming scheme (eth*, ens*, etc.).

- name: Enable IPv4 forwarding via sysctl (persistent)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_file: "{{ nat_sysctl_conf }}"
    reload: true

- name: Update apt package cache (Debian family)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"

- name: Install iptables-persistent (Debian/Ubuntu)
  ansible.builtin.package:
    name: iptables-persistent
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: ansible_facts['os_family'] == "Debian"

- name: Disable firewalld (RHEL/Rocky — conflicts with manual iptables management)
  ansible.builtin.service:
    name: firewalld
    state: stopped
    enabled: false
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['services']['firewalld.service'] is defined

- name: Install iptables-services (RHEL/Rocky)
  ansible.builtin.package:
    name: iptables-services
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: Enable and start iptables service (RHEL/Rocky)
  ansible.builtin.service:
    name: iptables
    enabled: true
    state: started
  when: ansible_facts['os_family'] == "RedHat"

# ── Interface resolution ───────────────────────────────────────────────────────
# When a caller sets nat_external_interface / nat_internal_interface explicitly
# those values are used as-is (override path — also exercised by molecule tests).
# When the defaults are empty (""), the role derives the names from gathered
# facts: external from the default-route interface; internal from the interface
# carrying nat_internal_ip.  The assert below catches misconfiguration early.

- name: Resolve external interface (explicit override, else default-route interface)
  ansible.builtin.set_fact:
    _nat_external_iface: >-
      {{ nat_external_interface if (nat_external_interface | length > 0)
         else (ansible_facts.default_ipv4.interface | default('')) }}

- name: Resolve internal interface (explicit override, else interface holding nat_internal_ip)
  ansible.builtin.set_fact:
    _nat_internal_iface: >-
      {{ nat_internal_interface if (nat_internal_interface | length > 0)
         else (ansible_facts.interfaces
               | map('extract', ansible_facts)
               | selectattr('ipv4', 'defined')
               | selectattr('ipv4.address', 'equalto', nat_internal_ip)
               | map(attribute='device') | first | default('')) }}

- name: Assert both NAT interfaces resolved
  ansible.builtin.assert:
    that:
      - _nat_external_iface | length > 0
      - _nat_internal_iface | length > 0
    fail_msg: >-
      Could not resolve NAT interfaces (external='{{ _nat_external_iface }}',
      internal='{{ _nat_internal_iface }}'). Set nat_external_interface /
      nat_internal_interface explicitly, or ensure nat_internal_ip
      ('{{ nat_internal_ip }}') is live on an interface and facts are gathered.
    success_msg: >-
      NAT interfaces resolved: external={{ _nat_external_iface }},
      internal={{ _nat_internal_iface }}

- name: MASQUERADE outbound traffic on external interface
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ _nat_external_iface }}"
    jump: MASQUERADE
  notify: Persist iptables rules

- name: Allow FORWARD from internal to external interface
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ _nat_internal_iface }}"
    out_interface: "{{ _nat_external_iface }}"
    jump: ACCEPT
  notify: Persist iptables rules

- name: Allow FORWARD for established/related connections returning from external
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ _nat_external_iface }}"
    out_interface: "{{ _nat_internal_iface }}"
    ctstate:
      - ESTABLISHED
      - RELATED
    jump: ACCEPT
  notify: Persist iptables rules

# ── Internal-subnet route (fixes ProxyJump 2nd-hop on multi-NIC bastion) ─────
# On a GCP dual-NIC VM the secondary interface's subnet route may not be in the
# main routing table. Without it, bastion-originated traffic to 10.100.0.0/24
# falls through to the default route, hits MASQUERADE, and never reaches
# internal nodes. ip route replace is idempotent (add-or-update).

- name: Check current internal-subnet route
  ansible.builtin.command:
    cmd: ip route show {{ nat_internal_cidr }}
  register: _nat_internal_route_current
  changed_when: false
  when: nat_internal_route_manage | bool

- name: Install internal-subnet route via internal interface (live)
  ansible.builtin.command:
    cmd: >-
      ip route replace {{ nat_internal_cidr }}
      dev {{ _nat_internal_iface }}
      {{ (nat_internal_ip != '') | ternary('src ' ~ nat_internal_ip, '') }}
  changed_when: >-
    ('dev ' ~ _nat_internal_iface) not in _nat_internal_route_current.stdout
  when: nat_internal_route_manage | bool

- name: Template systemd oneshot unit for route persistence
  ansible.builtin.template:
    src: stratum-internal-route.service.j2
    dest: "{{ nat_internal_route_unit }}"
    owner: root
    group: root
    mode: "0644"
  when:
    - nat_internal_route_manage | bool
    - ansible_facts['service_mgr'] == 'systemd'

- name: Enable and start systemd unit to persist internal-subnet route
  ansible.builtin.systemd_service:
    name: "{{ nat_internal_route_unit | basename | regex_replace('\\.service$', '') }}"
    enabled: true
    daemon_reload: true
    state: started
  when:
    - nat_internal_route_manage | bool
    - ansible_facts['service_mgr'] == 'systemd'
